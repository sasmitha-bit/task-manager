<!DOCTYPE html>
<html>
<head>
  <title>Task Manager Pro</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1d2b64, #f8cdda);
  text-align: center;
  color: white;
}

h2 {
  margin-top: 30px;
  font-size: 32px;
  letter-spacing: 1px;
}

.container {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  width: 350px;
  margin: 30px auto;
  backdrop-filter: blur(10px);
  box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
}

input {
  padding: 10px;
  width: 65%;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.add-btn {
  background: #00ffcc;
  color: black;
}

.add-btn:hover {
  background: #00ccaa;
}

.done-btn {
  background: #4CAF50;
  color: white;
}

.delete-btn {
  background: #ff4d4d;
  color: white;
}

li {
  list-style: none;
  margin: 10px;
  background: white;
  color: black;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  animation: fadeIn 0.3s ease-in;
}

.task-text {
  flex: 1;
  text-align: left;
}

.completed {
  text-decoration: line-through;
  color: gray;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<h2>✨ Task Manager Pro</h2>

<div class="container">

<input type="text" id="taskInput" placeholder="Enter your task...">
<button class="add-btn" onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>
const API = "http://localhost:3000/tasks";

// LOAD TASKS
async function loadTasks() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  data.forEach((task, index) => {
    if (!task) return;

    const li = document.createElement("li");

    li.innerHTML = `
      <span class="task-text ${task.completed ? "completed" : ""}">
        ${task.title}
      </span>

      <div>
        <button class="done-btn" onclick="toggleTask(${index})">✔</button>
        <button class="delete-btn" onclick="deleteTask(${index})">✖</button>
      </div>
    `;

    list.appendChild(li);
  });
}

// TOGGLE
async function toggleTask(index) {
  await fetch(API + "/" + index, { method: "PUT" });
  loadTasks();
}

// ADD
async function addTask() {
  const inputBox = document.getElementById("taskInput");
  const input = inputBox.value;

  if (!input) {
    alert("Enter a task!");
    return;
  }

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title: input, completed: false })
  });

  inputBox.value = "";
  loadTasks();
}

// DELETE
async function deleteTask(index) {
  await fetch(API + "/" + index, { method: "DELETE" });
  loadTasks();
}

loadTasks();
</script>

</body>
</html>
